include:
  - path:
      - ./supabase/docker/docker-compose.yml
      - ./docker-compose.override.supabase.yml

volumes:
  n8n_storage:
    external: true
    name: n8n_storage
  caddy-data:
  caddy-config:
  valkey-data:
  portainer-data:
  docling-models:

x-n8n: &service-n8n
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=db
    - DB_POSTGRESDB_USER=postgres
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_POSTGRESDB_DATABASE=postgres
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - OLLAMA_HOST=host.docker.internal:11434
    - NODE_FUNCTION_ALLOW_EXTERNAL=csv-parse,papaparse,cheerio,fast-xml-parser,slugify,xmlbuilder2,pdf-lib
    - GENERIC_TIMEZONE=Europe/Warsaw
    - TZ=Europe/Warsaw
    - NODE_FUNCTION_ALLOW_BUILTIN=*
    - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
    - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_DEFAULT_BINARY_DATA_MODE:-"filesystem"}
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    - N8N_RUNNERS_ENABLED=true
    - N8N_ENABLED_MODULES=data-table
    - N8N_PROXY_HOPS=1
    - WEBHOOK_URL=${N8N_HOSTNAME:+https://}${N8N_HOSTNAME:-http://localhost:5678}
    # Queue mode
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_BULL_REDIS_PORT=6379
    - QUEUE_BULL_REDIS_DB=2
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    - N8N_RESTRICT_FILE_ACCESS_TO=/tmp/n8n-backups;/home/node/.n8n-files
    - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=true
    - NODES_EXCLUDE="[]"
    # Odkomentuj, aby ustawić NODE_PATH (np. jeśli potrzebujesz globalnych npm)
    #- NODE_PATH=/home/node/node_modules

services:
  n8n-main:
    <<: *service-n8n
    image: n8n-custom:latest
    build:
      context: .
      dockerfile: n8n.dockerfile
    container_name: n8n-main
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - 5678/tcp
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/backup:/backup
      - ./shared:/data/shared
    networks:
      - shared-infra
      - caddy-net

  n8n-worker:
    <<: *service-n8n
    image: n8n-custom:latest
    container_name: n8n-worker
    command: worker
    restart: unless-stopped
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./shared:/data/shared
    networks:
      - shared-infra

  caddy:
    container_name: caddy
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    ports:
      - 80:80/tcp
      - 443:443/tcp
    expose:
      - 2019/tcp
      - 443/tcp
      - 443/udp
      - 80/tcp
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-addon:/etc/caddy/addons:ro
      - caddy-data:/data:rw
      - caddy-config:/config:rw
    environment:
      - N8N_HOSTNAME=${N8N_HOSTNAME:-":8001"}
      - SUPABASE_HOSTNAME=${SUPABASE_HOSTNAME:-":8005"}
      - PORTAINER_HOSTNAME=${PORTAINER_HOSTNAME:-":8006"}
      - DOCLING_HOSTNAME=${DOCLING_HOSTNAME:-":8007"}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-internal}
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - caddy-net

  redis:
    container_name: redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    expose:
      - 6379/tcp
    volumes:
      - valkey-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - shared-infra

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    expose:
      - 9000/tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    networks:
      - caddy-net

  docling-serve:
    container_name: docling-serve
    image: ghcr.io/docling-project/docling-serve-cpu:latest
    restart: unless-stopped
    # Pobiera brakujące modele HF przed startem serwera (tylko przy 1. uruchomieniu)
    entrypoint: >
      sh -c "
      docling-tools models download-hf-repo docling-project/CodeFormulaV2 &&
      exec docling-serve run --enable-ui
      "
    expose:
      - 5001/tcp
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_API_KEY=${DOCLING_API_KEY}
      - DOCLING_DEVICE=cpu
      - DOCLING_NUM_THREADS=${DOCLING_NUM_THREADS:-4}
      - DOCLING_SERVE_LOG_LEVEL=WARNING
      - DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS=false
      - DOCLING_SERVE_MAX_NUM_PAGES=${DOCLING_MAX_PAGES:-100}
      - DOCLING_SERVE_MAX_FILE_SIZE=${DOCLING_MAX_FILE_SIZE:-52428800}
      - DOCLING_SERVE_CORS_ORIGINS=["*"]
    volumes:
      - docling-models:/opt/app-root/src/.cache/docling/models
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared-infra
      - caddy-net

networks:
  caddy-net:
    external: true
  shared-infra:
    external: true
